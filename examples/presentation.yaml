sources:
  background:
    type: image
    path: images/background.png
  slides1:
    tag: SLD1
    type: pdf
    path: slides.pdf
    width: 1920
    height: 1080
    makescene: false
  slides2:
    tag: SLD1
    type: pdf
    path: slides.pdf
    width: 1920
    height: 1080
    makescene: false


scenes:
  slides1:
    layers:
      - source: background
        transform:
          x: 0
          y: 0
          scale: 1
          opacity: 1
      - source: slides1
        transform:
          cx: 0
          cy: 0
          scale: 1
          opacity: 1
        warp:
          cx: 1
          cy: 0
          scale: 1
          opacity: 0
      - source: slides2
        transform:
          cx: 0.5
          cy: 0.5
          scale: 0.2
          opacity: 0
  slides2:
    layers:
      - source: background
        transform:
          x: 0
          y: 0
          scale: 1
          opacity: 1
      - source: slides2
        transform:
          cx: 0
          cy: 0
          scale: 1
          opacity: 1
        warp:
          cx: 1
          cy: 0
          scale: 1
          opacity: 0
      - source: slides1
        transform:
          cx: 0.5
          cy: 0.5
          scale: 0.2
          opacity: 0
        warp:
          cx: 1
          cy: 0
          scale: 1
          opacity: 0

  side-by-side:
    layers:
      - source: background
        transform:
          x: 0
          y: 0
          scale: 1
          opacity: 1
      - source: slides1
        transform:
          cx: 0.25
          cy: 0.5
          left: 0.01
          opacity: 1
      - source: slides2
        transform:
          cx: 0.75
          cy: 0.5
          right: 0.01
          opacity: 1

sinks:
  projector:
    type: window
    frames:
      width: 1280
      height: 720
    default_scene: slides1
    transition_time_ms: 1500

sequence:
  - scene: slides1
    page:
      slides1: 0
      slides2: 1
  - scene: slides2
    page:
      slides2: 1
      slides1: 2
  - scene: slides1
    page:
      slides1: 2
      slides2: 3

api:
  bind: ':8000'
  enable_profiler: true

fallback_colour: '#ebac54'
bg_colour: '#54aceb'
